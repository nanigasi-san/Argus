name: argus
description: Geo-fence monitoring app per spec.md
publish_to: "none"
version: 0.3.3
environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  brotli: ^0.6.0
  crypto: ^3.0.7
  geolocator: ^14.0.2
  path: ^1.9.0
  file_selector: ^1.1.0
  image: ^4.8.0
  path_provider: ^2.1.1
  json_annotation: ^4.11.0
  collection: ^1.17.2
  qr: ^3.0.1
  meta: ^1.10.0
  provider: ^6.0.5
  flutter_local_notifications: ^19.5.0
  flutter_ringtone_player: ^4.0.0
  permission_handler: ^12.0.1
  vibration: ^2.0.0
  mobile_scanner: ^7.2.0
  url_launcher: ^6.3.2
  share_plus: ^11.1.0
  gal: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.14.1
  json_serializable: ^6.13.1
  path_provider_platform_interface: ^2.1.2

dependency_overrides:
  geolocator_linux: 0.2.3
  package_info_plus: 8.3.1

flutter:
  uses-material-design: true
  assets:
    - assets/config/default_config.json
    - assets/geojson/
    - icon.png
    - assets/sounds/alarm.mp3
  fonts:
    - family: BIZ UDPGothic
      fonts:
        - asset: assets/fonts/BIZUDPGothic-Regular.ttf
          weight: 400
        - asset: assets/fonts/BIZUDPGothic-Bold.ttf
          weight: 700
